<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">

  <rect width="600" height="300" fill="#FFF5F5"/>
  <!-- Calendar grid representing production schedule -->
  <rect x="60" y="40" width="220" height="220" rx="14" fill="#ffffff" stroke="#fcc" stroke-width="2"/>
  <rect x="60" y="40" width="220" height="44" rx="14" fill="#E05656" opacity=".8"/>
  <rect x="60" y="68" width="220" height="16" fill="#E05656" opacity=".8"/>
  <text x="170" y="66" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#ffffff">오늘의 생산 계획</text>
  <!-- Schedule rows - crossed out -->
  <rect x="80" y="100" width="180" height="22" rx="5" fill="#fee"/>
  <line x1="80" y1="111" x2="260" y2="111" stroke="#E05656" stroke-width="2.5"/>
  <text x="90" y="116" font-family="system-ui,sans-serif" font-size="11" fill="#5E6B61" opacity=".6">09:00 A사료 생산 300kg</text>
  <rect x="80" y="132" width="180" height="22" rx="5" fill="#fee"/>
  <line x1="80" y1="143" x2="260" y2="143" stroke="#E05656" stroke-width="2.5"/>
  <text x="90" y="148" font-family="system-ui,sans-serif" font-size="11" fill="#5E6B61" opacity=".6">11:00 B사료 배합 200kg</text>
  <rect x="80" y="164" width="180" height="22" rx="5" fill="#fee"/>
  <line x1="80" y1="175" x2="260" y2="175" stroke="#E05656" stroke-width="2.5"/>
  <text x="90" y="180" font-family="system-ui,sans-serif" font-size="11" fill="#5E6B61" opacity=".6">14:00 설비 점검 예정</text>
  <!-- Emergency badge -->
  <rect x="80" y="200" width="180" height="48" rx="8" fill="#E05656"/>
  <text x="170" y="221" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#ffffff">긴급 추가</text>
  <text x="170" y="238" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#ffffff">C농장 사료 500kg 즉시!</text>
  <!-- Right: impact arrow -->
  <polygon points="296,145 316,155 296,165" fill="#E05656" opacity=".6"/>
  <line x1="280" y1="155" x2="296" y2="155" stroke="#E05656" stroke-width="2" opacity=".6"/>
  <!-- Right impact card -->
  <rect x="326" y="60" width="224" height="180" rx="14" fill="#ffffff" stroke="#fcc" stroke-width="1.5"/>
  <text x="438" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#E05656">당일 계획 전면 수정</text>
  <rect x="346" y="106" width="184" height="20" rx="5" fill="#fee"/>
  <text x="438" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#E05656">기존 3개 라인 중단</text>
  <rect x="346" y="134" width="184" height="20" rx="5" fill="#fee"/>
  <text x="438" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#E05656">설비 세팅 2시간 추가</text>
  <rect x="346" y="162" width="184" height="20" rx="5" fill="#fee"/>
  <text x="438" y="176" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#E05656">인력 초과 근무 발생</text>
  <rect x="346" y="190" width="184" height="36" rx="8" fill="#E05656" opacity=".12"/>
  <text x="438" y="213" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#E05656">매주 반복됩니다</text>

</svg>