<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">

  <rect width="400" height="220" fill="#ffffff"/>
  <!-- LEFT: 당일주문 (chaos) -->
  <rect x="0" y="0" width="180" height="220" fill="#FFF5F5"/>
  <text x="90" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#E05656">당일 주문</text>
  <!-- Random scattered dots (unplanned) -->
  <circle cx="40" cy="70" r="8" fill="#E05656" opacity=".7"/>
  <circle cx="100" cy="55" r="8" fill="#E05656" opacity=".7"/>
  <circle cx="70" cy="100" r="8" fill="#E05656" opacity=".7"/>
  <circle cx="140" cy="80" r="8" fill="#E05656" opacity=".7"/>
  <circle cx="55" cy="130" r="8" fill="#E05656" opacity=".7"/>
  <circle cx="120" cy="145" r="8" fill="#E05656" opacity=".7"/>
  <circle cx="80" cy="170" r="8" fill="#E05656" opacity=".7"/>
  <circle cx="150" cy="160" r="8" fill="#E05656" opacity=".7"/>
  <!-- Erratic arrows -->
  <line x1="48" y1="70" x2="92" y2="57" stroke="#E05656" stroke-width="1.5" opacity=".5" stroke-dasharray="3,2"/>
  <line x1="108" y1="59" x2="62" y2="96" stroke="#E05656" stroke-width="1.5" opacity=".5" stroke-dasharray="3,2"/>
  <line x1="63" y1="105" x2="132" y2="83" stroke="#E05656" stroke-width="1.5" opacity=".5" stroke-dasharray="3,2"/>
  <!-- RIGHT: 계획배송 (organized calendar) -->
  <rect x="180" y="0" width="220" height="220" fill="#EDF4E7"/>
  <text x="290" y="30" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#3F6B33">계획 배송</text>
  <!-- Calendar grid -->
  <rect x="200" y="42" width="180" height="160" rx="10" fill="#ffffff" stroke="#B7D2A9" stroke-width="1.5"/>
  <rect x="200" y="42" width="180" height="30" rx="10" fill="#3F6B33"/>
  <rect x="200" y="56" width="180" height="16" fill="#3F6B33"/>
  <text x="290" y="63" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#ffffff">배송 일정표</text>
  <!-- Calendar rows -->
  <rect x="210" y="84" width="70" height="20" rx="4" fill="#87B570" opacity=".6"/>
  <text x="245" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#3F6B33">A농장 배송</text>
  <rect x="290" y="84" width="80" height="20" rx="4" fill="#B7D2A9"/>
  <text x="330" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#3F6B33">C농장 배송</text>
  <rect x="210" y="114" width="160" height="20" rx="4" fill="#87B570" opacity=".4"/>
  <text x="290" y="128" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#3F6B33">B·D농장 통합 루트</text>
  <rect x="210" y="144" width="90" height="20" rx="4" fill="#B7D2A9"/>
  <text x="255" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#3F6B33">E농장 배송</text>
  <rect x="210" y="174" width="130" height="20" rx="4" fill="#87B570" opacity=".3"/>
  <text x="275" y="188" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#3F6B33">F·G농장 계획</text>
  <!-- Arrow divider -->
  <polygon points="175,104 185,110 175,116" fill="#3F6B33"/>
  <line x1="155" y1="110" x2="175" y2="110" stroke="#3F6B33" stroke-width="3"/>

</svg>