<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">

  <rect width="400" height="220" fill="#EDF4E7"/>
  <!-- Device box -->
  <rect x="140" y="80" width="120" height="100" rx="14" fill="#3F6B33"/>
  <rect x="150" y="90" width="100" height="70" rx="8" fill="#3F6B33" opacity=".5"/>
  <!-- LED lights -->
  <circle cx="165" cy="106" r="5" fill="#87B570"/>
  <circle cx="182" cy="106" r="5" fill="#87B570" opacity=".5"/>
  <circle cx="199" cy="106" r="5" fill="#F5A623" opacity=".7"/>
  <!-- Screen display -->
  <rect x="155" y="118" width="90" height="32" rx="4" fill="#ffffff" opacity=".15"/>
  <text x="200" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff">78% · 연동됨</text>
  <!-- WiFi waves (large) -->
  <path d="M200,50 Q240,30 280,50" fill="none" stroke="#87B570" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M200,66 Q248,40 296,66" fill="none" stroke="#B7D2A9" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M200,82 Q256,50 312,82" fill="none" stroke="#B7D2A9" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
  <!-- Connection dot -->
  <circle cx="200" cy="80" r="6" fill="#3F6B33"/>
  <!-- FMC cloud -->
  <rect x="20" y="60" width="90" height="50" rx="16" fill="#ffffff" stroke="#B7D2A9" stroke-width="2"/>
  <text x="65" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#3F6B33">FMC</text>
  <text x="65" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5E6B61">시스템 연동</text>
  <line x1="110" y1="85" x2="140" y2="110" stroke="#87B570" stroke-width="2" stroke-dasharray="4,2"/>

</svg>