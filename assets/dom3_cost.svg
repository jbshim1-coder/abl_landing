<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">

  <rect width="600" height="300" fill="#FFF5F5"/>
  <!-- Left: cost breakdown -->
  <rect x="40" y="40" width="240" height="220" rx="14" fill="#ffffff" stroke="#fcc" stroke-width="2"/>
  <rect x="40" y="40" width="240" height="44" rx="14" fill="#E05656" opacity=".8"/>
  <rect x="40" y="68" width="240" height="16" fill="#E05656" opacity=".8"/>
  <text x="160" y="65" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#ffffff">긴급 배송 추가 비용</text>
  <!-- Cost items -->
  <text x="60" y="105" font-family="system-ui,sans-serif" font-size="12" fill="#5E6B61">연료비 추가</text>
  <text x="260" y="105" text-anchor="end" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#E05656">+82,000원</text>
  <line x1="60" y1="112" x2="260" y2="112" stroke="#fee" stroke-width="1"/>
  <text x="60" y="135" font-family="system-ui,sans-serif" font-size="12" fill="#5E6B61">기사 초과 근무</text>
  <text x="260" y="135" text-anchor="end" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#E05656">+120,000원</text>
  <line x1="60" y1="142" x2="260" y2="142" stroke="#fee" stroke-width="1"/>
  <text x="60" y="165" font-family="system-ui,sans-serif" font-size="12" fill="#5E6B61">차량 공회전</text>
  <text x="260" y="165" text-anchor="end" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#E05656">+34,000원</text>
  <line x1="60" y1="172" x2="260" y2="172" stroke="#fee" stroke-width="1"/>
  <text x="60" y="195" font-family="system-ui,sans-serif" font-size="12" fill="#5E6B61">긴급 배차 관리비</text>
  <text x="260" y="195" text-anchor="end" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#E05656">+28,000원</text>
  <line x1="60" y1="210" x2="260" y2="210" stroke="#E05656" stroke-width="1.5"/>
  <text x="60" y="235" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#3F6B33">1회 긴급 배송 추가</text>
  <text x="260" y="235" text-anchor="end" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#E05656">+264,000원</text>
  <!-- Right: monthly/yearly impact -->
  <rect x="310" y="40" width="250" height="220" rx="14" fill="#E05656" opacity=".08" stroke="#fcc" stroke-width="1.5"/>
  <text x="435" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#3F6B33">월 평균 4회 발생 시</text>
  <text x="435" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="38" font-weight="800" fill="#E05656">106만원</text>
  <text x="435" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#5E6B61">월 추가 비용</text>
  <line x1="330" y1="170" x2="540" y2="170" stroke="#fcc" stroke-width="1"/>
  <text x="435" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#3F6B33">연간</text>
  <text x="435" y="235" text-anchor="middle" font-family="system-ui,sans-serif" font-size="30" font-weight="800" fill="#E05656">1,272만원</text>
  <text x="435" y="254" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#5E6B61">계획 없이 나가는 비용</text>

</svg>